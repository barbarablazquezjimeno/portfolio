<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="none"/>
  <!-- ROVI: Pharmaceutical/Medical style -->
  <g transform="translate(100, 100)">
    <!-- Hexagon (pharmaceutical) -->
    <polygon points="0,-35 30,-17.5 30,17.5 0,35 -30,17.5 -30,-17.5" fill="none" stroke="#1a5e52" stroke-width="2.5"/>
    <!-- Cross inside -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#1a5e52" stroke-width="2"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#1a5e52" stroke-width="2"/>
  </g>
</svg>